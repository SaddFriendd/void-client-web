<script src="db.js"></script>
<script>
  const ADMIN_PASSWORD = "YOUR_ADMIN_PASSWORD";

  function checkPass() {
    const val = document.getElementById("adminPass").value;
    if (val === ADMIN_PASSWORD) {
      document.getElementById("gate").style.display = "none";
      document.getElementById("adminPanel").style.display = "block";
      loadUsers(); loadKeys(); generateKey();
    } else {
      document.getElementById("gateErr").style.display = "block";
    }
  }

  function generateKeyString() {
    const chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    const seg = () => Array.from({length:4}, () => chars[Math.floor(Math.random()*chars.length)]).join("");
    return `VOID-${seg()}-${seg()}-${seg()}-${seg()}-${seg()}`;
  }

  let pendingKey = "";
  function generateKey() {
    pendingKey = generateKeyString();
    document.getElementById("currentKey").textContent = pendingKey;
    document.getElementById("copiedMsg").style.display = "none";
  }

  async function copyKey() {
    if (!pendingKey) return;
    navigator.clipboard.writeText(pendingKey);
    const result = await adminAddKey(ADMIN_PASSWORD, pendingKey);
    if (result.ok) {
      document.getElementById("copiedMsg").style.display = "inline";
      generateKey();
      loadKeys();
    }
  }

  async function loadUsers() {
    const tbody = document.getElementById("usersTable");
    tbody.innerHTML = `<tr><td colspan="5" style="color:#64748b;text-align:center;padding:30px">Loading...</td></tr>`;
    const result = await adminGetUsers(ADMIN_PASSWORD);
    if (!result.ok || !result.users.length) {
      tbody.innerHTML = `<tr><td colspan="5" style="color:#64748b;text-align:center;padding:30px">No users yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = result.users.map((u, i) => `
      <tr>
        <td style="color:#475569">${i+1}</td>
        <td style="font-weight:600">${u.username}</td>
        <td style="color:#64748b">${new Date(u.registeredAt).toLocaleDateString()}</td>
        <td><span class="status-active">● Active</span></td>
        <td><button class="delete-btn" onclick="deleteUser('${u.username}')">Remove</button></td>
      </tr>
    `).join("");
  }

  async function deleteUser(username) {
    if (!confirm(`Remove "${username}"?`)) return;
    await adminDeleteUser(ADMIN_PASSWORD, username);
    loadUsers();
  }

  async function loadKeys() {
    const tbody = document.getElementById("keysTable");
    tbody.innerHTML = `<tr><td colspan="4" style="color:#64748b;text-align:center;padding:30px">Loading...</td></tr>`;
    const result = await adminGetKeys(ADMIN_PASSWORD);
    if (!result.ok || !result.keys.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:#64748b;text-align:center;padding:30px">No keys yet.</td></tr>`;
      return;
    }
    tbody.innerHTML = [...result.keys].reverse().map((k, i) => `
      <tr>
        <td style="color:#475569">${result.keys.length - i}</td>
        <td class="key-mono">${k.key}</td>
        <td><span class="used-badge ${k.used ? 'badge-used' : 'badge-valid'}">${k.used ? 'USED' : 'VALID'}</span></td>
        <td style="color:#64748b">${k.usedAt ? new Date(k.usedAt).toLocaleDateString() : '—'}</td>
      </tr>
    `).join("");
  }

  // Upload new client version
  async function uploadVersion() {
    const name = document.getElementById("uploadName").value.trim();
    const version = document.getElementById("uploadVersion").value.trim();
    const url = document.getElementById("uploadUrl").value.trim();
    if (!name || !version || !url) return alert("Fill all upload fields.");
    const result = await adminAddUpload(ADMIN_PASSWORD, name, version, url);
    if (result.ok) { alert("Upload added!"); document.getElementById("uploadName").value=""; document.getElementById("uploadVersion").value=""; document.getElementById("uploadUrl").value=""; }
    else alert("Error: " + result.msg);
  }
</script>
