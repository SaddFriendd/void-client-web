<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Void Client</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0f;
      color: #fff;
    }

    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 60px;
      background: rgba(255,255,255,0.03);
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .logo {
      font-weight: 900;
      background: linear-gradient(135deg,#a855f7,#6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .btn-nav {
      padding: 10px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    .btn-outline {
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
    }

    .btn-primary {
      background: linear-gradient(135deg,#a855f7,#6366f1);
      color: white;
    }

    .hero {
      text-align: center;
      padding: 120px 20px;
    }

    h1 {
      font-size: 60px;
      font-weight: 900;
      margin-bottom: 20px;
    }

    h1 span {
      background: linear-gradient(135deg,#a855f7,#818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero p {
      color: #94a3b8;
      margin-bottom: 40px;
    }

    /* PRICING */
    .pricing {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }

    .price-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 30px 40px;
      min-width: 200px;
    }

    .price-title {
      font-size: 14px;
      color: #a855f7;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .price-amount {
      font-size: 42px;
      font-weight: 900;
      margin-bottom: 5px;
      background: linear-gradient(135deg,#a855f7,#818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .price-sub {
      font-size: 13px;
      color: #64748b;
    }

    .buy-btn {
      padding: 16px 50px;
      background: linear-gradient(135deg,#a855f7,#6366f1);
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      display: inline-block;
    }

    .paypal-note {
      margin-top: 12px;
      font-size: 13px;
      color: #64748b;
    }

  </style>
</head>

<body>

<nav>
  <div class="logo">Void Client</div>
  <div>
    <a href="#" class="btn-nav btn-outline">Login</a>
    <a href="https://discord.gg/rKgUXeR5dX" class="btn-nav btn-primary">Buy Now</a>
  </div>
</nav>

<section class="hero">

  <h1>Dominate With <span>Void Client</span></h1>

  <p>The most powerful, lightweight, and undetectable Minecraft client.</p>

  <!-- NEW PRICING -->
  <div class="pricing">

    <div class="price-card">
      <div class="price-title">MONTHLY</div>
      <div class="price-amount">$10</div>
      <div class="price-sub">per account / month</div>
    </div>

    <div class="price-card">
      <div class="price-title">YEARLY</div>
      <div class="price-amount">$30</div>
      <div class="price-sub">per account / year</div>
    </div>

  </div>

  <a href="https://discord.gg/rKgUXeR5dX" class="buy-btn">
    Buy Now — Join Discord
  </a>

  <p class="paypal-note">
    💳 PayPal (Xoom) · 🔒 Subscription-based access
  </p>

</section>

</body>
</html>
