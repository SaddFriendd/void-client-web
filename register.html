<script src="db.js"></script>
<script>
async function doRegister() {
  const key      = document.getElementById("key").value.trim();
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  const confirm  = document.getElementById("confirm").value;
  const btn      = document.getElementById("registerBtn");

  if (!key || !username || !password || !confirm) return showMsg("Fill in all fields.", "error");
  if (password !== confirm) return showMsg("Passwords do not match.", "error");
  if (username.length < 3) return showMsg("Username must be at least 3 characters.", "error");

  btn.disabled = true;
  btn.textContent = "Creating account...";

  const result = await registerUser(username, password, key);
  if (!result.ok) {
    btn.disabled = false;
    btn.textContent = "Create Account";
    return showMsg(result.msg, "error");
  }

  showMsg("Account created! Redirecting to login...", "success");
  setTimeout(() => window.location.href = "login.html", 2000);
}

function showMsg(text, type) {
  const el = document.getElementById("msg");
  el.textContent = text;
  el.className = "msg " + type;
}
</script>
