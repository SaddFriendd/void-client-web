<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – Void Client</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Inter',sans-serif; background:#0a0a0f; color:#fff; min-height:100vh; }

    nav {
      display:flex; justify-content:space-between; align-items:center;
      padding:18px 60px;
      background:rgba(255,255,255,0.03);
      border-bottom:1px solid rgba(255,255,255,0.07);
    }
    .nav-logo { font-size:20px; font-weight:900; background:linear-gradient(135deg,#a855f7,#6366f1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .nav-right { display:flex; align-items:center; gap:14px; }
    .nav-username { font-size:14px; font-weight:600; color:#94a3b8; }
    .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#a855f7,#6366f1); display:flex; align-items:center; justify-content:center; font-size:15px; font-weight:800; color:#fff; }
    .logout-btn { padding:7px 16px; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); border-radius:8px; color:#94a3b8; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; }
    .logout-btn:hover { background:rgba(255,255,255,0.1); color:#fff; }

    .container { max-width:860px; margin:50px auto; padding:0 30px; }

    .welcome-box {
      background:linear-gradient(135deg,rgba(168,85,247,0.12),rgba(99,102,241,0.08));
      border:1px solid rgba(168,85,247,0.2);
      border-radius:20px; padding:36px 40px; margin-bottom:28px;
    }
    .welcome-box h1 { font-size:26px; font-weight:900; margin-bottom:6px; }
    .welcome-box h1 span { background:linear-gradient(135deg,#a855f7,#6366f1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .welcome-box p { color:#64748b; font-size:14px; }

    .discord-box {
      background:rgba(88,101,242,0.1);
      border:1px solid rgba(88,101,242,0.3);
      border-radius:16px; padding:24px 28px;
      display:flex; align-items:center; justify-content:space-between;
      gap:20px; flex-wrap:wrap; margin-bottom:36px;
    }
    .discord-left { display:flex; align-items:center; gap:16px; }
    .discord-icon { font-size:32px; }
    .discord-text h3 { font-size:16px; font-weight:800; margin-bottom:4px; color:#fff; }
    .discord-text p { font-size:13px; color:#94a3b8; }
    .discord-btn {
      padding:11px 24px;
      background:linear-gradient(135deg,#5865f2,#4752c4);
      border:none; border-radius:10px; color:#fff;
      font-size:14px; font-weight:700; cursor:pointer;
      font-family:inherit; text-decoration:none; white-space:nowrap;
      display:inline-block;
    }
    .discord-btn:hover { opacity:0.85; }

    .section-title { font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:1px; color:#64748b; margin-bottom:16px; }
    .empty { color:#64748b; font-size:14px; padding:20px 0; }
  </style>
</head>
<body>

<nav>
  <div class="nav-logo">⬛ Void Client</div>
  <div class="nav-right">
    <div class="avatar" id="avatarLetter">?</div>
    <span class="nav-username" id="navUsername">Loading...</span>
    <button class="logout-btn" onclick="logout()">Log out</button>
  </div>
</nav>

<div class="container">

  <div class="welcome-box">
    <h1>Welcome back, <span id="displayName">...</span> 👋</h1>
    <p>You're logged in to Void Client. Join our Discord for all releases and updates.</p>
  </div>

  <div class="discord-box">
    <div class="discord-left">
      <div class="discord-icon">💬</div>
      <div class="discord-text">
        <h3>Join the Void Client Discord</h3>
        <p>All releases, patches, and updates are posted in our Discord server.</p>
      </div>
    </div>
    <a class="discord-btn" href="https://discord.gg/cDHVzy4gx3" target="_blank">Join Discord →</a>
  </div>

</div>

<script src="db.js"></script>
<script>
  const user = JSON.parse(sessionStorage.getItem("void_user"));
  const displayName = user ? user.username : "Guest";
  document.getElementById("displayName").textContent = displayName;
  document.getElementById("navUsername").textContent = displayName;
  document.getElementById("avatarLetter").textContent = displayName[0].toUpperCase();

  function logout() {
    sessionStorage.removeItem("void_user");
    window.location.href = "login.html";
  }
</script>
</body>
</html>
