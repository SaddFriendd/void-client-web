<script src="db.js"></script>
<script>
  const user = JSON.parse(sessionStorage.getItem("void_user"));
  if (!user) window.location.href = "login.html";
  else {
    document.getElementById("displayName").textContent = user.username;
    document.getElementById("navUsername").textContent = user.username;
    document.getElementById("avatarLetter").textContent = user.username[0].toUpperCase();
    loadDownloads();
  }

  async function loadDownloads() {
    const result = await getUploads();
    const container = document.getElementById("downloadList");
    if (!result.ok || !result.uploads.length) {
      container.innerHTML = "<p style='color:#64748b'>No downloads available yet.</p>";
      return;
    }
    container.innerHTML = result.uploads.map((u, i) => `
      <div class="patch">
        <div>
          <div class="patch-name">${u.name}</div>
          <div class="patch-date">${new Date(u.uploadedAt).toLocaleDateString()}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          ${i === 0 ? '<span class="patch-badge badge-latest">LATEST</span>' : '<span class="patch-badge badge-old">OLDER</span>'}
          <a href="${u.url}" download style="padding:7px 18px;background:linear-gradient(135deg,#a855f7,#6366f1);border-radius:7px;color:#fff;font-size:13px;font-weight:700;text-decoration:none">Download</a>
        </div>
      </div>
    `).join("");
  }

  function logout() {
    sessionStorage.removeItem("void_user");
    window.location.href = "login.html";
  }
</script>
